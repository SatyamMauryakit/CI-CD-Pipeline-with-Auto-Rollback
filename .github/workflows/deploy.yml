name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/project-1:latest
            ${{ secrets.DOCKER_USERNAME }}/project-1:${{ github.sha }}

      # ✅ Copy files to EC2 (docker-compose + deploy.sh)
      - name: Copy files to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "docker-compose.yml,deploy.sh"
          target: "/home/ubuntu/temp/"

      # ✅ Create folder, move files, run deploy.sh
      - name: Setup & Deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            # 📁 Create main app folder
            mkdir -p /home/ubuntu/my-app

            # 📦 Move files from temp to app folder
            mv /home/ubuntu/temp/docker-compose.yml /home/ubuntu/my-app/
            mv /home/ubuntu/temp/deploy.sh /home/ubuntu/my-app/

            # 🔐 Give execute permission
            chmod +x /home/ubuntu/my-app/deploy.sh

            cd /home/ubuntu/my-app

            echo "🔐 Docker login"
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 🚀 Run deploy
            ./deploy.sh