name: CI/CD Pipeline

on:
  push:
    branches:
      - main
jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME}}  
          password: ${{ secrets.DOCKER_PASSWORD}}  
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/project-1:${{ github.ref_name }}
            ${{ secrets.DOCKER_USERNAME }}/project-1:latest
            ${{ secrets.DOCKER_USERNAME }}/project-1:${{ github.sha }}
      - name: SSH to EC2 & Deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
                 echo "Installing required packages & folders"
                 sudo apt-get update && sudo apt-get install docker.io docker-compose-v2 -y
                 sudo usermod -aG docker $USER
                 rm -rf ~/devops/docker-compose.yml
      - name: Copy the docker-compose file
        uses: appleboy/scp-action@v1
        with:
                host: ${{ secrets.EC2_IP }}
                username: ${{ secrets.EC2_USERNAME }}
                key: ${{ secrets.EC2_KEY }}
                source: docker-compose.yml
                overwrite: true
      - name: SSH to Prod server & run the app
        uses: appleboy/ssh-action@v1.0.3
        with:
                host: ${{ secrets.EC2_IP }}
                username: ${{ secrets.EC2_USERNAME }}
                key: ${{ secrets.EC2_KEY }}
                script: |
                 echo "Running App"
                 
                 export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
                 export DOCKER_TAG=${{ github.sha }}
                 echo ${{ secrets.DOCKER_PASSWORD }} | docker login --username ${{ secrets.DOCKER_USERNAME }} --password-stdin
                 docker compose down && docker compose up -d --build --force-recreate --pull always
                
         
        